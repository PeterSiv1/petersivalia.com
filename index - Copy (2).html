<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>petersivalia.com</title>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            font-size: 18px;
            line-height: 1.5;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }

        .audio-item {
            margin-bottom: 18px;
            padding: 16px;
            background: #1c1c1c;
            border-radius: 10px;
            font-size: 20px;
        }

        audio {
            width: 100%;
            margin-top: 12px;
        }

        /* Mobile scaling */
        @media (max-width: 600px) {
            body {
                font-size: 20px;
                padding: 16px;
            }

            h1 {
                font-size: 32px;
            }

            .audio-item {
                padding: 22px;
                font-size: 22px;
                border-radius: 14px;
            }

            audio {
                margin-top: 16px;
            }
        }
    </style>
</head>

<body>

<h1>Audio Files</h1>

<div id="audio-list"></div>

<script>
async function loadAudio() {
    const apiUrl = "https://api.github.com/repos/PeterSiv1/petersivalia.com/contents/audio_01";

    try {
        const response = await fetch(apiUrl);
        const files = await response.json();

        const audioList = document.getElementById("audio-list");
        audioList.innerHTML = "";

        files.forEach(file => {
            if (file.type === "file" && (file.name.endsWith(".mp3") || file.name.endsWith(".wav"))) {

                const container = document.createElement("div");
                container.className = "audio-item";

                const title = document.createElement("div");
                title.textContent = file.name;

                const audio = document.createElement("audio");
                audio.controls = true;
                audio.src = file.download_url;

                container.appendChild(title);
                container.appendChild(audio);
                audioList.appendChild(container);
            }
        });
    } catch (err) {
        console.error("Error loading audio:", err);
        document.getElementById("audio-list").innerHTML = "Failed to load audio files.";
    }
}

loadAudio();
</script>

</body>
</html>
