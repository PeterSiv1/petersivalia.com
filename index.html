<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter's Audio Player</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
        padding-bottom: calc(70px + env(safe-area-inset-bottom));
    }

    h1 {
        text-align: center;
        padding: 20px 0;
        margin: 0;
        font-size: 24px;
    }

    .track-list {
        padding: 10px 20px;
    }

    .track {
        padding: 12px 0;
        border-bottom: 1px solid #333;
        font-size: 18px;
        cursor: pointer;
    }

    .track.playing {
        color: #1db954;
        font-weight: bold;
    }

    audio {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: #111;
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 9999;
    }

    audio::-webkit-media-controls-panel {
        height: 70px;
    }
</style>
</head>

<body>

<h1>Peter's Audio Player</h1>

<div class="track-list" id="trackList"></div>

<audio id="player" controls></audio>

<script>
    const player = document.getElementById('player');
    const trackListDiv = document.getElementById('trackList');
    let currentTrackElement = null;

    // Load file list from GitHub API (root folder)
    fetch('https://api.github.com/repos/PeterSiv1/petersivalia.com/contents/')
        .then(response => response.json())
        .then(files => {
            files
                .filter(f => f.name.match(/\.(mp3|wav)$/i))
                .forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'track';
                    div.textContent = file.name;

                    // Use GitHub's raw download URL
                    div.onclick = () => playTrack(file.download_url, div);

                    trackListDiv.appendChild(div);
                });
        })
        .catch(err => console.error('Error loading file list:', err));

    function playTrack(src, element) {
        player.src = src;
        player.play();

        if (currentTrackElement) {
            currentTrackElement.classList.remove('playing');
        }

        element.classList.add('playing');
        currentTrackElement = element;
    }
</script>

</body>
</html>
