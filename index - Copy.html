<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>petersivalia.com</title>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .audio-item {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Audio Files</h1>

<!-- REQUIRED: this is where your JS inserts audio players -->
<div id="audio-list"></div>

<script>
async function loadAudio() {
    const apiUrl = "https://api.github.com/repos/PeterSiv1/petersivalia.com/contents/audio_01";

    try {
        const response = await fetch(apiUrl);
        const files = await response.json();

        const audioList = document.getElementById("audio-list");
        audioList.innerHTML = "";

        files.forEach(file => {
            if (file.type === "file" && (file.name.endsWith(".mp3") || file.name.endsWith(".wav"))) {

                const container = document.createElement("div");
                container.className = "audio-item";

                const title = document.createElement("div");
                title.textContent = file.name;

                const audio = document.createElement("audio");
                audio.controls = true;

                audio.src = file.download_url;

                container.appendChild(title);
                container.appendChild(audio);
                audioList.appendChild(container);
            }
        });
    } catch (err) {
        console.error("Error loading audio:", err);
        document.getElementById("audio-list").innerHTML = "Failed to load audio files.";
    }
}

loadAudio();
</script>

</body>
</html>
